# Supabase local development configuration
# Run `npx supabase start` to spin up local services
# Docs: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
# Local email testing (replaces Resend in local dev)
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:8081"
additional_redirect_urls = ["https://localhost:8081"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

# Apple Sign-In (configure for production)
[auth.external.apple]
enabled = false
client_id = ""
secret = ""

[edge_runtime]
policy = "oneshot"

# Disable gateway-level JWT pre-verification for composite-products.
# Supabase recently rotated the auth service to sign JWTs with ES256, but
# the Functions gateway's cached verification still expects HS256, causing
# UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM 401s on every panel build.
# The function's own code calls supabase.auth.getUser(jwt) which hits the
# auth service API directly and verifies ES256 correctly.
[functions.composite-products]
verify_jwt = false

# Same ES256/HS256 gateway mismatch applies to normalize-room-photo.
# Without this, Build 22's server-side EXIF rotation silently 401s at the
# gateway on every upload and the client falls back to the raw URL — which
# is what produced the Apr 18 2026 dashboard showing "No recent invocations"
# on the normalize function after it was deployed. The function's handler
# validates the user JWT itself via supabase.auth.getUser(token), so turning
# off gateway verify_jwt does not weaken auth.
[functions.normalize-room-photo]
verify_jwt = false

# Build 40 root cause: same ES256/HS256 mismatch was silently 401-ing every
# ai-proxy call after the 2026-04 auth-service rotation. Symptom: every
# generation attempt failed ~168ms after submission. With three rings firing
# (panel → individual refs → BFL) and a panel composite call in between,
# the user saw "Generation Failed" alerts ~3-5s after pressing Generate.
# Probe that found it:
#   curl POST /functions/v1/ai-proxy with a fresh signup JWT
#     → {"code":"UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM",
#        "message":"Unsupported JWT algorithm ES256"}, HTTP 401
# The function code itself was fine — supabase.auth.getUser(jwt) inside the
# handler hits the auth service API directly and verifies ES256 correctly.
# Turning off gateway verify_jwt does not weaken auth.
[functions.ai-proxy]
verify_jwt = false

# Same ES256/HS256 gateway mismatch was silently 401-ing every vision-match
# call since the 2026-04 auth-service rotation. Symptom discovered Build 69
# post-ship verification: fresh-signup JWT returned
# {"code":"UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM"} from the gateway,
# meaning the Anthropic vision step has never fired in production — product
# matching has been silently falling back to local prompt-parsing instead of
# analyzing the actual generated image. The function's handler validates
# the user JWT itself via supabase.auth.getUser(token), so turning off
# gateway verify_jwt does not weaken auth.
[functions.vision-match]
verify_jwt = false

[analytics]
enabled = false
