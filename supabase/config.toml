# Supabase local development configuration
# Run `npx supabase start` to spin up local services
# Docs: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
# Local email testing (replaces Resend in local dev)
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:8081"
additional_redirect_urls = ["https://localhost:8081"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

# Apple Sign-In (configure for production)
[auth.external.apple]
enabled = false
client_id = ""
secret = ""

[edge_runtime]
policy = "oneshot"

# Disable gateway-level JWT pre-verification for composite-products.
# Supabase recently rotated the auth service to sign JWTs with ES256, but
# the Functions gateway's cached verification still expects HS256, causing
# UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM 401s on every panel build.
# The function's own code calls supabase.auth.getUser(jwt) which hits the
# auth service API directly and verifies ES256 correctly.
[functions.composite-products]
verify_jwt = false

[analytics]
enabled = false
